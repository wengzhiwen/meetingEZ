<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetingEZ - 智能会议助手</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>
<body>
    <div class="container app-shell">
        <div class="transcript-container">
            <div id="transcriptContent" class="transcript-content">
                <div class="welcome-message">
                    <p>欢迎使用 MeetingEZ！</p>
                    <p>点击底部开始按钮开始实时转写。</p>
                </div>
            </div>
            <!-- 当选择第二语言时，将把上面的 transcriptContent 替换为以下左右分屏容器：
            <div id="transcriptSplit" class="transcript-split" style="display:none;">
                <div id="transcriptLeft" class="transcript-pane" aria-label="主要语言"></div>
                <div id="transcriptRight" class="transcript-pane" aria-label="第二语言"></div>
            </div> -->
        </div>

        <div class="floating-dock">
            <div class="dock-meta">
                <div class="volume-meter compact">
                    <div id="volumeBar" class="volume-bar"></div>
                </div>
                <div id="meetingTimer" class="meeting-timer">未开始</div>
            </div>
            <div class="dock-tools">
                <button id="testMicrophone" class="btn btn-icon btn-outline" title="测试麦克风" aria-label="测试麦克风">测</button>
                <button id="autoScroll" class="btn btn-icon btn-primary" title="自动滚动" aria-label="自动滚动">滚</button>
                <button id="downloadTranscript" class="btn btn-icon btn-outline" title="下载" aria-label="下载" disabled>下</button>
                <button id="clearTranscript" class="btn btn-icon btn-outline" title="清空" aria-label="清空" disabled>空</button>
                <button id="settingsToggle" class="btn btn-icon btn-outline" title="设置" aria-label="设置">设</button>
                <button id="meetingAction" class="btn btn-success" disabled>开始</button>
            </div>
        </div>

        <div id="settingsBackdrop" class="settings-backdrop hidden"></div>
        <div id="settingsPanel" class="settings-panel hidden" aria-hidden="true">
            <div class="settings-header">
                <h3>设置</h3>
                <button id="closeSettings" class="btn btn-icon btn-outline" type="button" aria-label="关闭设置">×</button>
            </div>

            <div class="setting-item compact-row">
                <label>API 连接</label>
                <button id="testConnection" class="btn btn-small btn-secondary" title="测试连接">测试连接</button>
            </div>
            <div class="setting-item compact-row connection-row">
                <label>连接状态</label>
                <span id="audioStatus" class="status-indicator">未连接</span>
            </div>
            <div id="connectionStatus" class="status-message"></div>

            <div class="setting-item stack">
                <label>音频输入源</label>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="audioSource" value="microphone" id="audioSourceMic" checked>
                        <span>使用麦克风</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="audioSource" value="tab" id="audioSourceTab">
                        <span>使用标签页音频</span>
                    </label>
                </div>
            </div>

            <div id="tabAudioHint" class="status-message info" style="display: none;">
                <strong>标签页音频模式</strong>
                点击开始后请在浏览器弹窗中选择标签页，并勾选共享标签页音频。
            </div>

            <div class="setting-item stack" id="audioInputContainer">
                <label for="audioInput">输入设备</label>
                <select id="audioInput" class="device-select">
                    <option value="">加载中...</option>
                </select>
            </div>

            <div class="setting-item stack">
                <label for="primaryLanguage">主要语言</label>
                <select id="primaryLanguage">
                    <option value="zh">中文 (简体)</option>
                    <option value="zh-TW">中文 (繁體)</option>
                    <option value="en" selected>English</option>
                    <option value="ja">日本語</option>
                    <option value="ko">한국어</option>
                    <option value="es">Español</option>
                    <option value="fr">Français</option>
                    <option value="de">Deutsch</option>
                    <option value="ru">Русский</option>
                    <option value="pt">Português</option>
                </select>
            </div>

            <div class="setting-item stack">
                <label for="secondaryLanguage">第二语言（可选）</label>
                <select id="secondaryLanguage">
                    <option value="">无</option>
                    <option value="zh">中文 (简体)</option>
                    <option value="zh-TW">中文 (繁體)</option>
                    <option value="en">English</option>
                    <option value="ja">日本語</option>
                    <option value="ko">한국어</option>
                    <option value="es">Español</option>
                    <option value="fr">Français</option>
                    <option value="de">Deutsch</option>
                    <option value="ru">Русский</option>
                    <option value="pt">Português</option>
                </select>
            </div>

            <div class="setting-item stack">
                <label for="fontSize">字体大小</label>
                <select id="fontSize">
                    <option value="small">小</option>
                    <option value="medium" selected>中</option>
                    <option value="large">大</option>
                </select>
            </div>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="loading-spinner"></div>
        <p>正在连接...</p>
    </div>

    <div id="errorModal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>错误</h3>
            <p id="errorMessage"></p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/realtime-transcription.js') }}?v=20260320"></script>
    <script type="module" src="{{ url_for('static', filename='js/app.js') }}?v=20260320"></script>
</body>
</html>
