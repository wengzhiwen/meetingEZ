<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetingEZ - 登录</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <style>
        .login-container {
            max-width: 380px;
            margin: 15vh auto;
            background: white;
            border-radius: 12px;
            padding: 40px 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .login-container h1 {
            font-size: 2rem;
            color: #333;
            margin-bottom: 8px;
        }
        .login-container .subtitle {
            color: #6c757d;
            font-size: 0.95rem;
            margin-bottom: 30px;
        }
        .login-container input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            margin-bottom: 16px;
            transition: border-color 0.3s ease;
        }
        .login-container input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .login-container .btn {
            width: 100%;
            padding: 12px;
            font-size: 16px;
        }
        .login-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 16px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-container">
            <h1>MeetingEZ</h1>
            <p class="subtitle">请输入访问码</p>
            {% if error %}
            <div class="login-error">{{ error }}</div>
            {% endif %}
            <form method="POST" action="{{ url_for('main.login') }}">
                <input type="password" name="access_code" placeholder="访问码" autofocus required autocomplete="off">
                <button type="submit" class="btn btn-success">进入</button>
            </form>
        </div>
    </div>
</body>
</html>
